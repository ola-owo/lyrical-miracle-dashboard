[project]
name = "lyrical-miracle-dashboard"
version = "0.1.0"
requires-python = ">=3.13"
dependencies = [
    "duckdb>=1.4.3",
    "networkx>=3.6.1",
    "numpy>=2.3.5",
    "pendulum>=3.1.0",
    "plotly>=6.5.0",
    "polars>=1.36.1",
    "streamlit-agraph>=0.0.45",
    "streamlit[charts]>=1.52.2",
]

[dependency-groups]
dev = [
    "ipython>=9.8.0",
    "ruff>=0.14.10",
]

[tool.ruff.format]
quote-style = "single"
