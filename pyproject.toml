[project]
name = "lyric-analyzer"
version = "0.1.0"
requires-python = ">=3.13"
dependencies = [
    "duckdb>=1.4.3",
    "lyric_analyzer_base",
    "networkx>=3.6.1",
    "numpy>=2.3.5",
    "pendulum>=3.1.0",
    "polars>=1.36.1",
]

[tool.uv.sources]
lyric-analyzer-base = { workspace = true }

[tool.uv.workspace]
# packages/ is for backend, apps/ is for frontend
members = ["packages/*", "apps/*"]

[dependency-groups]
dev = [
    "ipython>=9.8.0",
    "ruff>=0.14.10",
]

[tool.ruff.format]
quote-style = "single"
